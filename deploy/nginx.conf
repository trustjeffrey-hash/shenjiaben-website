# 沈家本研究院官网
# 服务器部署配置 (Linux/CentOS/Ubuntu)

# ═══════════════════════════════════════════════════
# Nginx 配置
# ═══════════════════════════════════════════════════
# 文件路径: /etc/nginx/conf.d/shenjiaben.conf

server {
    listen 80;
    server_name shenjiaben.org www.shenjiaben.org;
    
    # 前端静态文件
    root /var/www/shenjiaben/src/frontend;
    index index.html;
    
    # 日志
    access_log /var/log/nginx/shenjiaben_access.log;
    error_log /var/log/nginx/shenjiaben_error.log;
    
    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 管理后台
    location /admin/ {
        alias /var/www/shenjiaben/src/admin/;
        try_files $uri $uri/ /admin/index.html;
    }
    
    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    
    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# ═══════════════════════════════════════════════════
# 如需 HTTPS，使用 Let's Encrypt:
# certbot --nginx -d shenjiaben.org -d www.shenjiaben.org
# ═══════════════════════════════════════════════════
