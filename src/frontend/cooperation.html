<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await coopLoad('/cooperation/partners','partners-grid',renderPartner);
  await coopLoad('/cooperation/conferences','conferences-list',renderConference);
  await coopLoad('/cooperation/international','international-grid',renderInternational);
});

async function coopLoad(api, cid, render){
  const c=document.getElementById(cid);
  try{
    const d=await ShenJB.api.get(api);
    if(!d||!d.items||!d.items.length){ShenJB.renderState.empty(c);return;}
    c.innerHTML=d.items.map(render).join('');
  }catch{ShenJB.renderState.error(c);}
}

function renderPartner(p){return `<div class="card text-center"><div style="width:80px;height:80px;background:var(--bg-section);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-size:24px;color:var(--color-primary);">${(p.name||'?')[0]}</div><h3 style="font-size:var(--fs-card-title);color:var(--text-primary);">${p.name}</h3><p style="font-size:var(--fs-note);color:var(--text-secondary);margin-top:4px;">${p.type||''}</p></div>`;}
function renderConference(c){return `<div class="card" style="margin-bottom:16px;"><div class="flex-between"><h3 style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);">${c.title}</h3><span style="font-size:var(--fs-note-sm);color:var(--text-tertiary);">${c.date||''}</span></div><p style="font-size:var(--fs-body-sm);color:var(--text-secondary);margin-top:8px;">${c.topic||''} · ${c.location||''}</p></div>`;}
function renderInternational(i){return `<div class="card"><span class="tag tag-accent" style="margin-bottom:8px;">${i.country||''}</span><h3 style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);margin-bottom:8px;">${i.institution}</h3><p style="font-size:var(--fs-body-sm);color:var(--text-secondary);">${i.desc||''}</p></div>`;}
</script>
