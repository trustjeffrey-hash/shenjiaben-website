<body>

<header id="site-nav"></header>


<section class="hero" style="padding: 64px 0 48px;">
  <div class="hero-content">
    <span class="hero-badge">Mediation Center</span>
    <h1 class="hero-title">商事调解中心</h1>
    <p class="hero-subtitle">专业、高效、公正的商事争议解决平台</p>
  </div>
</section>

<!-- 中心介绍 -->
<section class="section">
  <div class="container">
    <h2 class="section-title">中心介绍</h2>
    <div class="section-divider"></div>
    <div id="med-intro">
      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
    </div>
  </div>
</section>

<!-- 调解流程 -->
<section class="section section-alt">
  <div class="container">
    <h2 class="section-title">调解流程</h2>
    <p class="section-subtitle">规范化调解程序，保障各方合法权益</p>
    <div class="section-divider"></div>
    <div id="med-process">
      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
    </div>
  </div>
</section>

<!-- 联系我们 -->
<section class="section section-alt">
  <div class="container" style="max-width:640px;">
    <h2 class="section-title">咨询预约</h2>
    <div class="section-divider"></div>
    <form id="med-form">
      <div class="form-group"><label class="form-label">姓名</label><input type="text" name="name" class="form-input" required></div>
      <div class="form-group"><label class="form-label">联系电话</label><input type="tel" name="phone" class="form-input" required></div>
      <div class="form-group"><label class="form-label">单位</label><input type="text" name="company" class="form-input"></div>
      <div class="form-group"><label class="form-label">咨询事项</label><textarea name="message" class="form-textarea" required></textarea></div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">提交咨询</button>
    </form>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadMedIntro();
  await loadMedProcess();
  new ShenJB.FormHandler('#med-form','/mediation/consult',{onSuccess:(r)=>{alert('咨询已提交，我们将尽快与您联系。');}});
});

async function loadMedIntro(){
  const c=document.getElementById('med-intro');
  try{
    const d=await ShenJB.api.get('/mediation/intro');
    if(!d){ShenJB.renderState.empty(c);return;}
    c.innerHTML=`<div style="max-width:800px;margin:0 auto;font-size:var(--fs-body-sm);color:var(--text-secondary);line-height:1.9;">${d.content||''}</div>`;
  }catch{ShenJB.renderState.error(c);}
}

async function loadMedProcess(){
  const c=document.getElementById('med-process');
  try{
    const d=await ShenJB.api.get('/mediation/process');
    if(!d||!d.steps){ShenJB.renderState.empty(c);return;}
    c.innerHTML=`<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:24px;">${d.steps.map((s,i)=>`
      <div class="card" style="flex:1;min-width:200px;text-align:center;">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:var(--font-heading);font-size:20px;font-weight:700;">${i+1}</div>
        <h3 style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);margin-bottom:6px;">${s.title}</h3>
        <p style="font-size:var(--fs-note);color:var(--text-secondary);">${s.desc}</p>
      </div>
    `).join('')}</div>`;
  }catch{ShenJB.renderState.error(c);}
}
</script>
