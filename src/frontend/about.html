<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadStructure();
  await loadHistory();
});

function drawOrgChart(depts, container) {
  // Extract departments (skip management layer for chart hierarchy)
  const mgmt = depts.find(d => d.name === '院管理层') || depts[0];
  const exec = depts.find(d => d.name === '执行对接窗口');
  const deptList = depts.filter(d => d.name !== '院管理层' && d.name !== '执行对接窗口');

  // Layout parameters
  const boxW = 200, boxH = 80;
  const deanW = 260, deanH = 90;
  const gapX = 24, gapY = 40;
  const deansGap = 60;

  const totalDeptW = deptList.length * boxW + (deptList.length - 1) * gapX;
  const totalW = Math.max(totalDeptW + 40, deanW * 2 + deansGap + 40, 750);
  const startX = totalW / 2 - totalDeptW / 2;
  const dean1X = totalW / 2 - deanW - deansGap / 2;
  const dean2X = totalW / 2 + deansGap / 2;
  const mgmtY = 30, deptY = mgmtY + deanH + gapY;
  const execW = 280, execH = 60;
  const execY = deptY + boxH + gapY;

  const totalH = exec ? (execY + execH + 20) : (deptY + boxH + 20);

  let svg = `<svg class="org-chart-svg" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#203B64" flood-opacity="0.12"/>
      </filter>
      <linearGradient id="deanGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#203B64"/>
        <stop offset="100%" stop-color="#2d5289"/>
      </linearGradient>
      <linearGradient id="deptGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f8f9fb"/>
        <stop offset="100%" stop-color="#eef1f6"/>
      </linearGradient>
    </defs>

    <!-- Background lines -->
    <rect x="0" y="0" width="${totalW}" height="${totalH}" fill="transparent" rx="0"/>

    <!-- Two Deans -->
    <rect x="${dean1X}" y="${mgmtY}" width="${deanW}" height="${deanH}" rx="8" fill="url(#deanGrad)" filter="url(#shadow)"/>
    <text x="${dean1X + deanW/2}" y="${mgmtY + 36}" text-anchor="middle" fill="#C89959" font-family="思源宋体, Source Han Serif SC, serif" font-size="15" font-weight="700">兼职院长</text>
    <text x="${dean1X + deanW/2}" y="${mgmtY + 60}" text-anchor="middle" fill="#fff" font-family="思源黑体, Microsoft YaHei, sans-serif" font-size="17" font-weight="700">蒋惠岭</text>
    <text x="${dean1X + deanW/2}" y="${mgmtY + 78}" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="思源黑体, Microsoft YaHei, sans-serif" font-size="11">同济大学法学院院长</text>

    <rect x="${dean2X}" y="${mgmtY}" width="${deanW}" height="${deanH}" rx="8" fill="url(#deanGrad)" filter="url(#shadow)"/>
    <text x="${dean2X + deanW/2}" y="${mgmtY + 36}" text-anchor="middle" fill="#C89959" font-family="思源宋体, Source Han Serif SC, serif" font-size="15" font-weight="700">专职院长</text>
    <text x="${dean2X + deanW/2}" y="${mgmtY + 60}" text-anchor="middle" fill="#fff" font-family="思源黑体, Microsoft YaHei, sans-serif" font-size="17" font-weight="700">王俊峰</text>
    <text x="${dean2X + deanW/2}" y="${mgmtY + 78}" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="思源黑体, Microsoft YaHei, sans-serif" font-size="11">中国政法大学本硕 · 香港城市大学博士</text>

    <!-- Lines from deans to departments -->
    <line x1="${dean1X + deanW/2}" y1="${mgmtY + deanH}" x2="${dean1X + deanW/2}" y2="${mgmtY + deanH + gapY/2}" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="${dean2X + deanW/2}" y1="${mgmtY + deanH}" x2="${dean2X + deanW/2}" y2="${mgmtY + deanH + gapY/2}" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="${dean1X + deanW/2}" y1="${mgmtY + deanH + gapY/2}" x2="${dean2X + deanW/2}" y2="${mgmtY + deanH + gapY/2}" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="${totalW/2}" y1="${mgmtY + deanH + gapY/2}" x2="${totalW/2}" y2="${deptY}" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- Horizontal top connector for departments -->
    <line x1="${startX + boxW/2}" y1="${deptY}" x2="${startX + totalDeptW - boxW/2}" y2="${deptY}" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.3"/>`;

  // Department boxes
  deptList.forEach((dept, i) => {
    const x = startX + i * (boxW + gapX);
    // Vertical line from top connector
    svg += `<line x1="${x + boxW/2}" y1="${deptY}" x2="${x + boxW/2}" y2="${deptY + 10}" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.3"/>`;

    svg += `
    <rect x="${x}" y="${deptY + 10}" width="${boxW}" height="${boxH}" rx="6" fill="url(#deptGrad)" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.25" filter="url(#shadow)"/>
    <text x="${x + boxW/2}" y="${deptY + 38}" text-anchor="middle" fill="#203B64" font-family="思源宋体, Source Han Serif SC, serif" font-size="15" font-weight="700">${dept.name}</text>
    <text x="${x + boxW/2}" y="${deptY + 60}" text-anchor="middle" fill="#6B84A8" font-family="思源黑体, Microsoft YaHei, sans-serif" font-size="11">
      ${dept.desc && dept.desc.length > 12 ? dept.desc.substring(0,12)+'…' : (dept.desc||'')}</text>`;

    // Sub items as small tags below
    if (dept.sub && dept.sub.length) {
      dept.sub.slice(0, 2).forEach((s, si) => {
        const short = s.length > 16 ? s.substring(0,16)+'…' : s;
        svg += `<text x="${x + boxW/2}" y="${deptY + 80 + si*14}" text-anchor="middle" fill="#999" font-family="思源黑体, Microsoft YaHei, sans-serif" font-size="9">${short}</text>`;
      });
    }
  });

  // Line to exec window
  if (exec) {
    const execX = totalW / 2 - execW / 2;
    svg += `
    <line x1="${totalW/2}" y1="${deptY + 10 + boxH}" x2="${totalW/2}" y2="${execY}" stroke="#203B64" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="${execX}" y="${execY}" width="${execW}" height="${execH}" rx="6" fill="#C89959" fill-opacity="0.12" stroke="#C89959" stroke-width="1.5" stroke-opacity="0.4" filter="url(#shadow)"/>
    <text x="${execX + execW/2}" y="${execY + 26}" text-anchor="middle" fill="#C89959" font-family="思源宋体, Source Han Serif SC, serif" font-size="13" font-weight="700">${exec.name}</text>
    <text x="${execX + execW/2}" y="${execY + 48}" text-anchor="middle" fill="#203B64" font-family="思源黑体, Microsoft YaHei, sans-serif" font-size="14" font-weight="600">${exec.desc}</text>`;
  }

  svg += `</svg>`;
  return svg;
}

async function loadStructure() {
  const c = document.getElementById('structure-content');
  try {
    const d = await ShenJB.api.get('/about/structure');
    if (!d || !d.departments || !d.departments.length) {
      // Fallback: render hardcoded org chart
      c.innerHTML = '<div class="org-chart-wrapper">' + drawOrgChart([
        { name: '院管理层', desc: '研究院决策与管理核心', sub: ['兼职院长：蒋惠岭', '专职院长：王俊峰', '学术委员会'] },
        { name: '学术研究部', desc: '课题申报、论文专著编撰、学术论坛筹办', sub: [] },
        { name: '文献史料中心', desc: '沈家本文献馆藏整理、古籍归档、史料校对汇编', sub: [] },
        { name: '商事调解研究中心', desc: '商事纠纷调解、调解员管理、调解机制研究', sub: [] },
        { name: '研学活动部', desc: '研学课程开发、接待讲解、普法活动', sub: [] },
        { name: '对外合作部', desc: '高校对接、政企合作、行业平台联动', sub: [] },
        { name: '行政综合部', desc: '人事、财务、公章管理、日常行政', sub: [] },
        { name: '执行对接窗口', desc: '王主任 13082838161', sub: [] },
      ], c) + '</div>';
      return;
    }
    c.innerHTML = '<div class="org-chart-wrapper">' + drawOrgChart(d.departments, c) + '</div>';
  } catch {
    ShenJB.renderState.error(c);
  }
}

async function loadHistory() {
  const c = document.getElementById('history-content');
  try {
    const d = await ShenJB.api.get('/about/history');
    if (!d || !d.items) { ShenJB.renderState.empty(c); return; }
    c.innerHTML = `<div class="timeline">${d.items.map(item => `
      <div class="timeline-item">
        <div class="timeline-year">${item.year}</div>
        <div class="timeline-desc">${item.event}</div>
      </div>
    `).join('')}</div>`;
  } catch { ShenJB.renderState.error(c); }
}
</script>
