<header id="site-nav"></header>


<section class="hero" style="padding: 64px 0 48px;">
  <div class="hero-content">
    <span class="hero-badge">Publications</span>
    <h1 class="hero-title">成果出版物</h1>
    <p class="hero-subtitle">汇集沈家本研究及相关法学领域的学术出版成果</p>
  </div>
</section>

<!-- 筛选 -->
<section class="section" style="padding-bottom:0;">
  <div class="container" id="pub-filters">
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:24px;" class="pub-filters-bar">
      <select name="category" class="form-select" style="width:auto;min-width:160px;">
        <option value="">全部分类</option>
        <option value="专著">专著</option>
        <option value="文献影印">文献影印</option>
        <option value="文献整理">文献整理</option>
        <option value="论文集">论文集</option>
        <option value="校注">校注</option>
        <option value="案例汇编">案例汇编</option>
        <option value="期刊">期刊</option>
        <option value="报告">报告</option>
      </select>
      <select name="year" class="form-select" style="width:auto;min-width:120px;">
        <option value="">全部年份</option>
      </select>
      <input type="text" name="keyword" class="form-input" placeholder="搜索出版物…" style="width:auto;min-width:200px;">
    </div>
  </div>
</section>

<section class="section" style="padding-top:0;">
  <div class="container">
    <div class="card-grid" id="pub-grid">
      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
    </div>
    <div id="pub-pagination"></div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  // 初始化年份选项
  const yearSelect = document.querySelector('[name="year"]');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= 2000; y--) {
    yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
  }
  // 初始化搜索筛选联动
  new ShenJB.SearchFilter({
    searchInput: '[name="keyword"]',
    filterContainer: '#pub-filters',
    onSearch: (filters) => loadPubs(1, filters)
  });
  loadPubs(1);
});

async function loadPubs(page = 1, filters = {}) {
  const grid = document.getElementById('pub-grid');
  const pag = document.getElementById('pub-pagination');
  ShenJB.renderState.loading(grid);
  try {
    const d = await ShenJB.api.get('/publications', { page, pageSize: 12, ...filters });
    if (!d || !d.items || !d.items.length) { ShenJB.renderState.empty(grid); pag.innerHTML = ''; return; }
    grid.innerHTML = d.items.map(p => {
      const hasCover = p.coverImage && p.coverImage.trim() !== '';
      const coverHtml = hasCover
        ? `<div class="pub-cover"><img src="${p.coverImage}" alt="${p.title}" loading="lazy" onerror="this.parentElement.outerHTML='<div class=\\'pub-cover-fallback\\'>封面</div>'"></div>`
        : `<div class="pub-cover-fallback">封面</div>`;
      return `
      <div class="card pub-card">
        ${coverHtml}
        <div class="pub-info">
          <span class="tag" style="margin-bottom:8px;">${p.category||p.categoryLabel||''}</span>
          <h3 class="pub-title">${p.title}</h3>
          <p class="pub-meta">${p.author||''} · ${p.year||''}</p>
          <p class="pub-publisher">${p.publisher||''}</p>
        </div>
      </div>
      `;
    }).join('');
    new ShenJB.Pagination(pag, { total: d.total, current: page, pageSize: 12, onChange: (p) => loadPubs(p, filters) });
  } catch { ShenJB.renderState.error(grid); }
}
</script>
