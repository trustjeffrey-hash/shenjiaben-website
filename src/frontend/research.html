<section class="hero" style="padding: 64px 0 48px;">

<!-- 史料文库 -->

  <div class="container">
    <h2 class="section-title">史料文库</h2>
    <div class="section-divider"></div>

      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>

</section>

<!-- 著作展示 -->

  <div class="container">
    <h2 class="section-title">学术著作</h2>

  <div class="container">
    <h2 class="section-title">课题研究</h2>

    </div>
  </div>

<!-- 研学活动 -->
<section class="section section-alt" id="study-tours">
  <div class="container">

    <div class="section-divider"></div>

      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async ()=>{
  await loadSection('/research/archives','archives-grid',renderArchiveCard);
  await loadSection('/research/works','works-grid',renderWorkCard);
  await loadProjects();
  await loadSection('/research/study','study-grid',renderStudyCard);
});

async function loadSection(api, cid, render){
  const c=document.getElementById(cid);
  try{
    const d=await ShenJB.api.get(api);
    if(!d||!d.items||!d.items.length){ShenJB.renderState.empty(c);return;}
    c.innerHTML=d.items.map(render).join('');
  }catch{ShenJB.renderState.error(c);}
}

async function loadProjects(){
  const c=document.getElementById('projects-list');
  try{
    const d=await ShenJB.api.get('/research/projects');
    if(!d||!d.items||!d.items.length){ShenJB.renderState.empty(c);return;}
    c.innerHTML=d.items.map(p=>`
      <div class="card" style="margin-bottom:16px;">
        <div class="flex-between">
          <div><span class="tag tag-warning" style="margin-right:12px;">${p.status||'进行中'}</span><span style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);">${p.name}</span></div>
          <span style="font-size:var(--fs-note-sm);color:var(--text-tertiary);">${p.period||''}</span>
        </div>
        <p style="font-size:var(--fs-body-sm);color:var(--text-secondary);margin-top:12px;">${p.desc||''}</p>
      </div>
    `).join('');
  }catch{ShenJB.renderState.error(c);}
}

function renderArchiveCard(a){
  return `<div class="card">
    <span class="tag tag-accent" style="margin-bottom:8px;">${a.category||'史料'}</span>
    <h3 style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);margin-bottom:8px;">${a.title}</h3>
    <p style="font-size:var(--fs-body-sm);color:var(--text-secondary);">${a.desc||''}</p>
  </div>`;
}
function renderWorkCard(w){
  return `<div class="card">
    <div style="height:120px;background:linear-gradient(135deg,#203B64,#6B84A8);border-radius:4px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:var(--fs-note);">著作封面</div>
    <h3 style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);">${w.title}</h3>
    <p style="font-size:var(--fs-note);color:var(--text-secondary);">${w.author||''} · ${w.year||''}</p>
  </div>`;
}
function renderStudyCard(s){
  return `<div class="card">
    <span class="tag tag-primary" style="margin-bottom:8px;">${s.type||'研学'}</span>
    <h3 style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);margin-bottom:8px;">${s.title}</h3>
    <p style="font-size:var(--fs-body-sm);color:var(--text-secondary);margin-bottom:8px;">${s.desc||''}</p>
    <span style="font-size:var(--fs-note-sm);color:var(--text-tertiary);">${s.date||''}</span>
  </div>`;
}
</script>
