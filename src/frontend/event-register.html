<body>

<header id="site-nav"></header>


<section class="hero" style="padding: 64px 0 48px;">
  <div class="hero-content">
    <h1 class="hero-title">活动报名</h1>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:640px;">
    <div class="card" style="margin-bottom:24px;" id="event-summary">
      <div class="loading-state"><div class="spinner"></div><p>加载活动信息…</p></div>
    </div>
    <form id="register-form">
      <div class="form-group"><label class="form-label">姓名 <span style="color:var(--color-danger);">*</span></label><input type="text" name="name" class="form-input" required></div>
      <div class="form-group"><label class="form-label">单位/职务</label><input type="text" name="org" class="form-input"></div>
      <div class="form-group"><label class="form-label">手机号 <span style="color:var(--color-danger);">*</span></label><input type="tel" name="phone" class="form-input" required></div>
      <div class="form-group"><label class="form-label">邮箱</label><input type="email" name="email" class="form-input"></div>
      <div class="form-group"><label class="form-label">备注</label><textarea name="remark" class="form-textarea" rows="3"></textarea></div>
      <input type="hidden" name="eventId" id="event-id-input">
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">确认报名</button>
    </form>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const eventId = params.get('id');
  if (eventId) {
    document.getElementById('event-id-input').value = eventId;
    await loadEventSummary(eventId);
  }
  new ShenJB.FormHandler('#register-form','/events/register',{
    onSuccess:()=>{alert('报名成功！');setTimeout(()=>{window.location.href='events.html';},1500);}
  });
});

async function loadEventSummary(id){
  const c=document.getElementById('event-summary');
  try{
    const d=await ShenJB.api.get(`/events/${id}`);
    c.innerHTML=`<h3 style="font-family:var(--font-heading);font-size:var(--fs-h3);color:var(--color-primary);margin-bottom:8px;">${d.title||''}</h3><p style="font-size:var(--fs-body-sm);color:var(--text-secondary);">📅 ${d.date||''} &nbsp; 📍 ${d.location||''}</p>`;
  }catch{c.innerHTML='<p style="color:var(--text-secondary);">活动信息加载失败</p>';}
}
</script>
