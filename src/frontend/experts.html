<body>

<header id="site-nav"></header>

<section class="section">
  <div class="container">
    <h1 class="section-title">专家委员会</h1>
    <p class="section-subtitle">12大细分法治研究中心 · 四大研究系列</p>
    <div class="section-divider"></div>

    <!-- 导语 -->
    <div class="experts-intro card" style="margin-bottom: 48px; border-left: 4px solid var(--color-accent);">
      <p style="font-size: var(--fs-body); color: var(--text-secondary); line-height: 1.9; margin: 0;">
        沈家本研究院下设<strong>12大细分法治研究中心</strong>，分<strong style="color: var(--color-accent);">四大研究系列</strong>，
        各中心设立首席专家席位，汇聚法学学界泰斗、头部律所资深合伙人、数字法治行业专家，
        组建本院智库专家委员会，为立法研究、商事调解、行业合规、产业法治提供学术与实务双重支撑。
      </p>
    </div>

    <!-- 四大系列动态渲染 -->
    <div id="experts-content">
      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
    </div>
  </div>
</section>

<!-- 统一合规页脚 -->
<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadExperts();

  async function loadExperts() {
    const c = document.getElementById('experts-content');
    ShenJB.renderState.loading(c);
    try {
      const data = await ShenJB.api.get('/experts');
      if (!data || !data.series) {
        ShenJB.renderState.empty(c);
        return;
      }
      c.innerHTML = data.series.map(series => `
        <div class="experts-series" style="margin-bottom: 48px;">
          <h3 class="experts-series-title">${series.name}</h3>
          <p class="experts-series-desc">${series.description || ''}</p>
          <div class="experts-grid">
            ${series.centers.map(center => `
              <div class="expert-card${center.isVacant ? ' expert-card-vacant' : ''}">
                <div class="expert-card-header">
                  <div class="expert-avatar-wrap">
                    ${center.isVacant
                      ? '<div class="expert-avatar-placeholder">待定</div>'
                      : `<img src="${center.expertAvatar || 'assets/images/shenjiaben-portrait.png'}" alt="${center.expertName}" class="expert-avatar" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="expert-avatar-placeholder" style="display:none">${(center.expertName||'')[0]}</div>`}
                  </div>
                  <div>
                    <h4 class="expert-center-name">${center.name}</h4>
                    <p class="expert-chief-label">
                      首席专家：${center.isVacant
                        ? '<span style="color:var(--color-muted);font-style:italic;">席位招募中</span>'
                        : `<strong>${center.expertName}</strong>${center.expertTitle ? ' · ' + center.expertTitle : ''}`}
                    </p>
                  </div>
                </div>
                ${center.centerIntro ? `<p class="expert-center-intro">${center.centerIntro}</p>` : ''}
                ${center.expertBio ? `
                  <div class="expert-bio">
                    <p>${center.expertBio}</p>
                  </div>` : ''}
                ${center.expertAffiliation ? `<p class="expert-affiliation">${center.expertAffiliation}</p>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      // Local practitioner section
      if (data.localExperts && data.localExperts.length) {
        c.innerHTML += `
          <div class="experts-series" style="margin-top: 48px;">
            <h3 class="experts-series-title" style="color: var(--color-accent);">附属本地实务专家</h3>
            <div class="experts-grid">
              ${data.localExperts.map(person => `
                <div class="expert-card">
                  <div class="expert-card-header">
                    <div class="expert-avatar-wrap">
                      <img src="${person.avatar || 'assets/images/shenjiaben-portrait.png'}" alt="${person.name}" class="expert-avatar" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="expert-avatar-placeholder" style="display:none">${(person.name||'')[0]}</div>
                    </div>
                    <div>
                      <h4 class="expert-center-name">${person.name}</h4>
                      <p class="expert-chief-label"><strong>${person.title || ''}</strong>${person.org ? ' · ' + person.org : ''}</p>
                    </div>
                  </div>
                  ${person.bio ? `<div class="expert-bio"><p>${person.bio}</p></div>` : ''}
                </div>
              `).join('')}
            </div>
          </div>`;
      }
    } catch {
      ShenJB.renderState.error(c);
    }
  }
});
</script>
