<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 — 湖州市沈家本研究院</title>
  <!-- 微信/社交分享优化 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="联系我们 — 湖州市沈家本研究院">
  <meta property="og:description" content="地址、电话、邮箱，欢迎来访交流。">
  <meta property="og:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <meta property="og:image:width" content="600">
  <meta property="og:image:height" content="600">
  <meta property="og:url" content="https://shenjiaben-research-institute.onrender.com/contact.html">
  <meta property="og:site_name" content="湖州市沈家本研究院">
  <meta property="og:locale" content="zh_CN">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="联系我们 — 湖州市沈家本研究院">
  <meta name="twitter:description" content="地址、电话、邮箱，欢迎来访交流。">
  <meta name="twitter:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <!-- Schema.org -->
  <meta itemprop="name" content="联系我们 — 湖州市沈家本研究院">
  <meta itemprop="description" content="地址、电话、邮箱，欢迎来访交流。">
  <meta itemprop="image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <!-- 微信 wx: 首选标签 -->
  <meta property="wx:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <meta property="wx:title" content="联系我们 — 湖州市沈家本研究院">
  <meta property="wx:description" content="地址、电话、邮箱，欢迎来访交流。">
  <meta property="wx:url" content="https://shenjiaben-research-institute.onrender.com/contact.html">
  <!-- 微信 wechat: 兼容标签 -->
  <meta name="wechat:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <meta name="wechat:title" content="联系我们 — 湖州市沈家本研究院">
  <meta name="wechat:description" content="地址、电话、邮箱，欢迎来访交流。">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

<header id="site-nav"></header>


<section class="hero" style="padding: 64px 0 48px;">
  <div class="hero-content">
    <span class="hero-badge">Contact</span>
    <h1 class="hero-title">联系我们</h1>
    <p class="hero-subtitle">欢迎各界人士与研究院取得联系</p>
  </div>
</section>

<!-- 联系信息 + 留言表单 -->
<section class="section">
  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:48px;" class="responsive-grid-2">
      <!-- 联系方式 -->
      <div>
        <h2 class="section-title" style="text-align:left;">联系方式</h2>
        <div class="section-divider" style="margin-left:0;"></div>
        <div id="contact-info">
          <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
        </div>
      </div>
      <!-- 留言表单 -->
      <div>
        <h2 class="section-title" style="text-align:left;">在线留言</h2>
        <div class="section-divider" style="margin-left:0;"></div>
        <form id="contact-form">
          <div class="form-group"><label class="form-label">姓名 <span style="color:var(--color-danger);">*</span></label><input type="text" name="name" class="form-input" required></div>
          <div class="form-group"><label class="form-label">邮箱</label><input type="email" name="email" class="form-input"></div>
          <div class="form-group"><label class="form-label">电话</label><input type="tel" name="phone" class="form-input"></div>
          <div class="form-group"><label class="form-label">留言内容 <span style="color:var(--color-danger);">*</span></label><textarea name="message" class="form-textarea" required></textarea></div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">提交留言</button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- 地图 -->
<section class="section section-alt">
  <div class="container">
    <h2 class="section-title">来访地图</h2>
    <div class="section-divider"></div>
    <div id="map-container" style="width:100%;height:360px;background:var(--bg-section);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:var(--fs-body-sm);flex-direction:column;gap:8px;">
      <p>📍 来访地址：浙江省湖州市吴兴区妙西镇沈家本历史文化园</p>
      <p style="font-size:var(--fs-note);color:var(--text-tertiary);">百度/高德地图搜索「沈家本历史文化园（妙西镇）」即可导航</p>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadContactInfo();
  new ShenJB.FormHandler('#contact-form','/contact/message',{
    onSuccess:()=>{alert('留言已提交，感谢您的反馈！');}
  });
});

async function loadContactInfo(){
  const c=document.getElementById('contact-info');
  try{
    const d=await ShenJB.api.get('/contact/info');
    if(!d){ShenJB.renderState.empty(c);return;}
    c.innerHTML=`
      <div class="card" style="margin-bottom:16px;">
        <div style="font-size:var(--fs-body-sm);color:var(--text-secondary);line-height:2.2;">
          <p><strong style="color:var(--text-primary);">📍 地址：</strong>${d.address||'待补充'}</p>
          <p><strong style="color:var(--text-primary);">👤 联系人：</strong>${d.contactPerson||'待补充'}</p>
          <p><strong style="color:var(--text-primary);">📞 电话：</strong>${d.phone||'待补充'}</p>
          <p><strong style="color:var(--text-primary);">📧 邮箱：</strong>${d.email||'待补充'}</p>
          <p><strong style="color:var(--text-primary);">🕐 工作时间：</strong>${d.workingHours||'周一至周五 9:00-17:00'}</p>
        </div>
      </div>
    `;
  }catch{ShenJB.renderState.error(c);}
}
</script>
</body>
</html>
