  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="活动专栏 — 湖州市沈家本研究院">
  <meta name="twitter:description" content="最新学术活动、论坛讲座预告与精彩回顾。">
  <meta name="twitter:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <!-- Schema.org -->
  <meta itemprop="name" content="活动专栏 — 湖州市沈家本研究院">
  <meta itemprop="description" content="最新学术活动、论坛讲座预告与精彩回顾。">
  <meta itemprop="image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <!-- 微信 wx: 首选标签 -->
  <meta property="wx:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <meta property="wx:title" content="活动专栏 — 湖州市沈家本研究院">
  <meta property="wx:description" content="最新学术活动、论坛讲座预告与精彩回顾。">
  <meta property="wx:url" content="https://shenjiaben-research-institute.onrender.com/events.html">
  <!-- 微信 wechat: 兼容标签 -->
  <meta name="wechat:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-branded.jpg">
  <meta name="wechat:title" content="活动专栏 — 湖州市沈家本研究院">
  <meta name="wechat:description" content="最新学术活动、论坛讲座预告与精彩回顾。">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

<header id="site-nav"></header>


<section class="hero" style="padding: 64px 0 48px;">
  <div class="hero-content">
    <span class="hero-badge">Events</span>
    <h1 class="hero-title">活动专栏</h1>
    <p class="hero-subtitle">学术讲座、研讨会、公众开放日等最新活动信息</p>
  </div>
</section>

<!-- 筛选 -->
<section class="section" style="padding-bottom:0;">
  <div class="container" id="event-filters">
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:24px;">
      <select name="status" class="form-select" style="width:auto;min-width:140px;">
        <option value="">全部状态</option>
        <option value="upcoming">即将开始</option>
        <option value="ongoing">进行中</option>
        <option value="past">已结束</option>
      </select>
      <select name="type" class="form-select" style="width:auto;min-width:140px;">
        <option value="">全部类型</option>
        <option value="行业峰会">行业峰会</option>
        <option value="学术会议">学术会议</option>
        <option value="研学">研学</option>
        <option value="培训">培训</option>
        <option value="沙龙">沙龙</option>
        <option value="座谈">座谈</option>
        <option value="签约仪式">签约仪式</option>
        <option value="仪式">仪式</option>
        <option value="文化活动">文化活动</option>
      </select>
      <input type="text" name="keyword" class="form-input" placeholder="搜索活动…" style="width:auto;min-width:200px;">
    </div>
  </div>
</section>

<!-- 活动列表 -->
<section class="section" style="padding-top:0;">
  <div class="container">
    <div id="events-list">
      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
    </div>
    <div id="events-pagination"></div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  new ShenJB.SearchFilter({
    searchInput: '[name="keyword"]',
    filterContainer: '#event-filters',
    onSearch: (filters) => loadEvents(1, filters)
  });
  loadEvents(1);
});

async function loadEvents(page=1, filters={}){
  const list=document.getElementById('events-list');
  const pag=document.getElementById('events-pagination');
  ShenJB.renderState.loading(list);
  try{
    const d=await ShenJB.api.get('/events',{page,pageSize:10,...filters});
    if(!d||!d.items||!d.items.length){ShenJB.renderState.empty(list);pag.innerHTML='';return;}
    list.innerHTML=d.items.map(e=>`
      <div class="card" style="margin-bottom:16px;cursor:pointer;" data-id="${e.id}">
        <div class="flex-between" style="flex-wrap:wrap;gap:8px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="tag tag-${e.status==='upcoming'?'success':e.status==='ongoing'?'warning':'muted'}">${e.statusLabel||e.status}</span>
            <span class="tag tag-accent">${e.typeLabel||e.type}</span>
            <span style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);">${e.title}</span>
          </div>
          ${e.status==='upcoming'?`<a href="event-register.html?id=${e.id}" class="btn btn-primary btn-sm">立即报名</a>`:''}
        </div>
        <div style="display:flex;gap:24px;margin-top:12px;font-size:var(--fs-note);color:var(--text-secondary);">
          <span>📅 ${e.date||''}</span><span>📍 ${e.location||''}</span><span>👤 ${e.speaker||''}</span>
        </div>
      </div>
    `).join('');
    // 点击卡片查看详情
    list.querySelectorAll('.card[data-id]').forEach(card=>{
      card.addEventListener('click',()=>showEventDetail(card.dataset.id));
    });
    new ShenJB.Pagination(pag,{total:d.total,current:page,pageSize:10,onChange:(p)=>loadEvents(p,filters)});
  }catch{ShenJB.renderState.error(list);}
}

async function showEventDetail(id){
  try{
    const d=await ShenJB.api.get(`/events/${id}`);
    ShenJB.modal.open(d.title||'活动详情',`
      <div style="line-height:1.8;font-size:var(--fs-body-sm);color:var(--text-secondary);">
        <p><strong>时间：</strong>${d.date||''}</p>
        <p><strong>地点：</strong>${d.location||''}</p>
        <p><strong>主讲人：</strong>${d.speaker||''}</p>
        <hr style="border-color:var(--border-color);margin:16px 0;">
        <p>${d.content||'暂无详情'}</p>
      </div>
    `);
  }catch{/* ignore */}
}
</script>
</body>
</html>
