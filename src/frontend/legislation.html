<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重点立法项目进度追踪系统 — 湖州市沈家本研究院</title>
  <!-- 微信/社交分享优化 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="立法研究 — 湖州市沈家本研究院">
  <meta property="og:description" content="实时追踪国家及地方重点立法项目进度，掌握法治建设最新动态。">
  <meta property="og:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-square.png" itemprop="image">
  <meta property="og:url" content="https://shenjiaben-research-institute.onrender.com/legislation.html">
  <meta name="wechat:title" content="立法研究 — 湖州市沈家本研究院">
  <meta name="wechat:description" content="实时追踪国家及地方重点立法项目进度。">
  <meta name="wechat:image" content="https://shenjiaben-research-institute.onrender.com/assets/images/wechat-share-square.png">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>

<header id="site-nav"></header>


<section class="hero" style="padding: 64px 0 48px;">
  <div class="hero-content">
    <span class="hero-badge">LEGISLATION TRACKER</span>
    <h1 class="hero-title">重点立法项目进度追踪系统</h1>
    <p class="hero-subtitle">追踪全国人大及地方人大重点立法项目审议进程，实时更新立法动态</p>
  </div>
</section>

<!-- 搜索 + 筛选 -->
<section class="section" style="padding-bottom:0;">
  <div class="container">
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;">
      <input type="text" name="keyword" class="form-input" placeholder="搜索立法项目名称…" style="flex:1;min-width:240px;">
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;" id="leg-filters">
      <select name="level" class="form-select" style="width:auto;min-width:130px;">
        <option value="">全部层级</option>
        <option value="national">全国人大</option>
        <option value="provincial">省级人大</option>
        <option value="municipal">市级人大</option>
      </select>
      <select name="status" class="form-select" style="width:auto;min-width:150px;">
        <option value="">全部状态</option>
        <option value="drafting">起草中</option>
        <option value="review">审议中</option>
        <option value="passed">已通过</option>
        <option value="promulgated">已公布</option>
        <option value="rejected">未通过</option>
      </select>
    </div>
  </div>
</section>

<!-- 卡片列表 -->
<section class="section" style="padding-top:16px;">
  <div class="container">
    <div id="leg-list">
      <div class="loading-state"><div class="spinner"></div><p>数据加载中…</p></div>
    </div>
    <div id="leg-pagination" style="margin-top:16px;"></div>
  </div>
</section>

<!-- 进度时间轴图表 -->
<section class="section section-alt">
  <div class="container">
    <h2 class="section-title">立法进度概览</h2>
    <div class="section-divider"></div>
    <div class="card">
      <h3 style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);margin-bottom:16px;">各阶段项目数量</h3>
      <div id="chart-leg-status" style="width:100%;height:360px;"></div>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/common.js"></script>
<script>
let legChart;
document.addEventListener('DOMContentLoaded', ()=>{
  new ShenJB.SearchFilter({
    searchInput:'[name="keyword"]',filterContainer:'#leg-filters',
    onSearch:(f)=>loadLegislation(1,f)
  });
  loadLegislation(1);
  loadLegStatusChart();
  window.addEventListener('resize',()=>legChart?.resize());
});

async function loadLegislation(page=1,filters={}){
  const list=document.getElementById('leg-list'),pag=document.getElementById('leg-pagination');
  ShenJB.renderState.loading(list);
  try{
    const d=await ShenJB.api.get('/legislation/list',{page,pageSize:10,...filters});
    if(!d||!d.items||!d.items.length){ShenJB.renderState.empty(list);pag.innerHTML='';return;}
    list.innerHTML=d.items.map(i=>{
      const statusMap={drafting:'accent',review:'warning',passed:'success',promulgated:'primary',rejected:'muted'};
      return `<div class="card" style="margin-bottom:16px;cursor:pointer;" data-id="${i.id}">
        <div class="flex-between" style="flex-wrap:wrap;gap:8px;">
          <div> <span class="tag tag-${statusMap[i.status]||'primary'}">${i.statusLabel||i.status}</span>
            <span class="tag tag-primary" style="margin-left:8px;">${i.levelLabel||i.level}</span>
            <span style="font-family:var(--font-heading);font-size:var(--fs-card-title);color:var(--text-primary);margin-left:8px;">${i.title}</span>
          </div>
          <span style="font-size:var(--fs-note-sm);color:var(--text-tertiary);">${i.lastUpdate||''}</span>
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('[data-id]').forEach(c=>c.addEventListener('click',()=>showLegDetail(c.dataset.id)));
    new ShenJB.Pagination(pag,{total:d.total,current:page,pageSize:10,onChange:(p)=>loadLegislation(p,filters)});
  }catch{ShenJB.renderState.error(list);}
}

async function showLegDetail(id){
  try{
    const d=await ShenJB.api.get(`/legislation/${id}`);
    let timelineHtml='';
    if(d.timeline&&d.timeline.length){
      timelineHtml=`<div class="timeline" style="margin-top:16px;">${d.timeline.map(t=>`<div class="timeline-item"><div class="timeline-year">${t.date}</div><div class="timeline-desc">${t.event}</div></div>`).join('')}</div>`;
    }
    ShenJB.modal.open(d.title||'立法详情',`
      <div style="line-height:1.9;font-size:var(--fs-body-sm);color:var(--text-secondary);">
        <p><strong style="color:var(--text-primary);">立法层级：</strong>${d.levelLabel||''}</p>
        <p><strong style="color:var(--text-primary);">当前状态：</strong><span class="tag tag-warning">${d.statusLabel||''}</span></p>
        <hr style="border-color:var(--border-color);margin:12px 0;">
        <p>${d.summary||'暂无摘要'}</p>
        ${timelineHtml}
        ${d.compareUrl?`<p style="margin-top:12px;"><a href="${d.compareUrl}" target="_blank">查看法条对比 →</a></p>`:''}
      </div>
    `);
  }catch{/* ignore */}
}

async function loadLegStatusChart(){
  const dom=document.getElementById('chart-leg-status');
  if(!dom)return;
  try{
    const d=await ShenJB.api.get('/legislation/stats');
    if(!legChart)legChart=echarts.init(dom);
    legChart.setOption({
      tooltip:{trigger:'axis'},
      grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},
      xAxis:{type:'category',data:(d?.items||[]).map(x=>x.name),axisLabel:{fontSize:11,color:'#999'}},
      yAxis:{type:'value',axisLabel:{fontSize:11,color:'#999'}},
      series:[{type:'bar',data:(d?.items||[]).map(x=>x.count),itemStyle:{color:function(p){return['#C89959','#E69523','#279E68','#203B64','#AAAAAA'][p.dataIndex%5];}},barMaxWidth:32,label:{show:true,position:'top',fontSize:12}}]
    });
  }catch{/* ignore */}
}
</script>
</body>
</html>
